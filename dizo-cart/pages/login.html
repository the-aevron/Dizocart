<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Dizo Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/01-variables-base.css">
<link rel="stylesheet" href="../assets/css/07-animations.css">
<link rel="stylesheet" href="../assets/css/08-ui-components.css">
<link rel="stylesheet" href="../assets/css/11-responsive.css">
<style>
  body { min-height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:2rem; }
  .auth-card { background:var(--white); border-radius:24px; padding:2.5rem 2rem; max-width:440px; width:100%; box-shadow:var(--shadow2); animation:fadeUp 0.4s ease; }
  .auth-logo { text-align:center; font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:600; margin-bottom:0.5rem; }
  .auth-logo span { color:var(--gold); }
  .auth-tabs { display:flex; border-bottom:2px solid var(--border); margin-bottom:1.75rem; }
  .auth-tab { flex:1; padding:0.75rem; text-align:center; font-size:0.875rem; font-weight:600; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.2s; }
  .auth-tab.active { color:var(--text); border-bottom-color:var(--gold); }
  .form-group { margin-bottom:1rem; }
  .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--text2); margin-bottom:0.4rem; }
  .form-group input { width:100%; padding:0.7rem 0.875rem; border:1.5px solid var(--border); border-radius:var(--r2); font-size:0.875rem; font-family:inherit; background:var(--bg); outline:none; transition:border-color 0.2s; box-sizing:border-box; }
  .form-group input:focus { border-color:var(--gold); }
  .btn-submit { width:100%; padding:0.875rem; background:var(--text); color:#fff; border:none; border-radius:var(--r2); font-size:0.875rem; font-weight:700; cursor:pointer; margin-top:0.5rem; transition:background 0.2s; }
  .btn-submit:hover { background:#333; }
  .auth-divider { text-align:center; font-size:0.8rem; color:var(--text3); margin:1rem 0; position:relative; }
  .auth-divider::before,.auth-divider::after { content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border); }
  .auth-divider::before { left:0; } .auth-divider::after { right:0; }
  .btn-social { width:100%; padding:0.75rem; border:1.5px solid var(--border); border-radius:var(--r2); background:var(--white); font-size:0.875rem; font-family:inherit; cursor:pointer; transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
  .btn-social:hover { background:var(--bg2); }
  .forgot-link { font-size:0.8rem; color:var(--gold); cursor:pointer; text-align:right; margin-top:-0.5rem; margin-bottom:1rem; display:block; }
  .back-link { text-align:center; margin-top:1.25rem; font-size:0.82rem; color:var(--text3); }
  .back-link a { color:var(--gold); font-weight:600; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">Dizo <span>Cart</span></div>
  <p style="text-align:center;color:var(--text3);font-size:0.82rem;margin-bottom:1.5rem">Bangladesh's Premium E-Commerce Store</p>

  <div class="auth-tabs">
    <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
    <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email / Phone</label>
      <input type="text" placeholder="email@example.com or 01XXXXXXXXX" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Your password" autocomplete="current-password">
    </div>
    <span class="forgot-link">Forgot password?</span>
    <button class="btn-submit" onclick="handleLogin()">Sign In</button>
    <div class="auth-divider">or continue with</div>
    <button class="btn-social" onclick="showMsg('Google login coming soon!')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none">
    <div style="display:flex;gap:0.75rem">
      <div class="form-group" style="flex:1"><label>First Name</label><input type="text" placeholder="Rahim"></div>
      <div class="form-group" style="flex:1"><label>Last Name</label><input type="text" placeholder="Uddin"></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" placeholder="email@example.com"></div>
    <div class="form-group"><label>Phone</label><input type="tel" placeholder="01XXXXXXXXX"></div>
    <div class="form-group"><label>Password</label><input type="password" placeholder="Create a password"></div>
    <button class="btn-submit" onclick="handleRegister()">Create Account</button>
  </div>

  <div class="back-link"><a href="../index.html">← Back to Shop</a></div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  }
  function handleLogin() {
    // TODO: Connect to Firebase/Supabase auth
    alert('🚧 Backend auth coming soon! Connect Firebase or Supabase in /backend/');
  }
  function handleRegister() {
    alert('🚧 Backend auth coming soon! Connect Firebase or Supabase in /backend/');
  }
  function showMsg(msg) { alert(msg); }
</script>
</body>
</html>
